name: 自动刷步数

on:
  schedule:
    - cron: '10 8 * * *'
  workflow_dispatch:
    inputs:
      distance:
        description: '跑步距离（公里，最大10）'
        required: false
        default: '2.5'
        type: string
      run_type:
        description: '跑步类型'
        required: false
        default: 'sunrun'
        type: choice
        options:
          - morningrun
          - sunrun
          - freedom

jobs:
  auto-run:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 2小时，10km绝对够用
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -i https://pypi.tuna.tsinghua.edu.cn/simple \
            httpx loguru sqlalchemy aiosqlite pycryptodome \
            rsa pillow aiohttp numpy cryptography
      - name: Run step counter
        env:
          ACCOUNT_USERNAME: ${{ secrets.ACCOUNT_USERNAME }}
          ACCOUNT_PASSWORD: ${{ secrets.ACCOUNT_PASSWORD }}
          SCHOOL_ID: ${{ secrets.SCHOOL_ID }}
          SCHOOL_CODE: ${{ secrets.SCHOOL_CODE }}
          SCHOOL_NAME: ${{ secrets.SCHOOL_NAME }}
          SCHOOL_URL: ${{ secrets.SCHOOL_URL }}
          LAN_URL: ${{ secrets.LAN_URL }}
          OPEN_ID: ${{ secrets.OPEN_ID }}
          SYS_TYPE: ${{ secrets.SYS_TYPE }}
          IS_OPEN_KEEP: ${{ secrets.IS_OPEN_KEEP }}
          IS_OPEN_LIVE: ${{ secrets.IS_OPEN_LIVE }}
          IS_OPEN_ENCRY: ${{ secrets.IS_OPEN_ENCRY }}
          RUN_DISTANCE: ${{ github.event_name == 'workflow_dispatch' && inputs.distance || '2.5' }}
          RUN_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.run_type || 'sunrun' }}
        run: python auto_run.py
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: run-logs-${{ github.run_id }}
          path: |
            *.log
            logs/
